# ============================================
# Production Profile - PostgreSQL Database
# Use with: mvn spring-boot:run -Dspring-boot.run.profiles=prod
# ============================================

# PostgreSQL Database Configuration
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/assainissement_db}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Security
jwt.secret=${JWT_SECRET:YourSuperSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong2024AssainissementPlatform}

# Logging
logging.level.com.assainissement=INFO
logging.level.org.springframework.security=WARN
