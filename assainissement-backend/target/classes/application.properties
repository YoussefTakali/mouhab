# Application Configuration
spring.application.name=assainissement-platform
server.port=8080

# ============================================
# PostgreSQL Database Configuration
# ============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/assainissement_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# JWT Configuration
jwt.secret=YourSuperSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong2024AssainissementPlatform
jwt.expiration=86400000

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
file.upload-dir=./uploads

# CORS Configuration
cors.allowed-origins=http://localhost:4200

# Logging
logging.level.com.assainissement=DEBUG
logging.level.org.springframework.security=DEBUG
